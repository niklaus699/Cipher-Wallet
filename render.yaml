services:
  # 1. The React Frontend (Vite)
  - type: static
    name: cipher-frontend
    env: static
    # We use --legacy-peer-deps in case the 'messy' structure has version conflicts
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # 2. The Backend (Node.js Web Service)
  - type: web
    name: cipher-backend
    env: node
    # We install ts-node so Render can run the .ts file directly without a pre-build step
    buildCommand: npm install && npm install ts-node typescript @types/node
    # Using ts-node to execute the wrapper we created
    startCommand: npx ts-node src/backend/server.js
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: PORT
        value: 10000