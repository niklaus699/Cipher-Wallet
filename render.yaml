services:
  # 1. The React Frontend (Vite)
  - type: static
    name: cipher-frontend
    # No 'env' line here—Static sites don't need it in the YAML spec
    buildCommand: npm install && npm run build
    publishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # 2. The Backend (Node.js Web Service)
  - type: web
    name: cipher-backend
    env: node
    buildCommand: npm install && npm install ts-node typescript @types/node
    startCommand: npx ts-node src/backend/server.js
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: PORT
        value: 10000